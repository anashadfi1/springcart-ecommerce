<nav class="sticky top-0 z-50 bg-slate-900 border-b border-white/10 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-4">

    <!-- Logo -->
    <a routerLink="/products" class="flex items-center gap-2 flex-shrink-0">
      <div class="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center">
        <span class="text-white font-bold text-sm">E</span>
      </div>
      <span class="text-xl font-bold text-white">Electro<span class="text-orange-500">Shop</span></span>
    </a>

    <!-- Search -->
    <div class="flex-1 max-w-xl">
      <div class="flex items-center bg-white/10 rounded-lg px-3 py-2 gap-2">
        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (keyup.enter)="onSearch()"
          placeholder="Search phones, tablets, headphones..."
          class="bg-transparent flex-1 text-sm text-white placeholder-slate-400 focus:outline-none"
        />
      </div>
    </div>

    <!-- Cart -->
    <a routerLink="/cart" class="relative p-2 rounded-full border border-white/20 text-white hover:bg-white/10 transition flex-shrink-0">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-8 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/>
      </svg>
      @if (cartService.totalItems() > 0) {
        <span class="absolute -top-1 -right-1 bg-orange-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">
          {{ cartService.totalItems() }}
        </span>
      }
    </a>

  </div>
</nav>
