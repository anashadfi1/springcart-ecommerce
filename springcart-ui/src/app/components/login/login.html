<div class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-8 shadow-2xl">

    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-white tracking-tight">Login Form</h1>
      <p class="text-slate-400 mt-2 text-sm">Sign in to your account to continue</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          class="w-full px-4 py-2.5 rounded-lg bg-white/10 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
        />
        <p *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
           class="text-red-400 text-xs mt-1">
          Please enter a valid email.
        </p>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="w-full px-4 py-2.5 rounded-lg bg-white/10 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
        />
        <p *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
           class="text-red-400 text-xs mt-1">
          Password must be at least 6 characters.
        </p>
      </div>

      <!-- Error -->
      <p *ngIf="errorMessage" class="text-red-400 text-sm text-center">{{ errorMessage }}</p>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="loginForm.invalid || isLoading"
        class="w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold rounded-lg transition duration-200">
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>

    </form>

    <p class="text-center text-slate-400 text-sm mt-6">
      Don't have an account?
      <a routerLink="/signup" class="text-indigo-400 hover:text-indigo-300 font-medium transition">Sign up</a>
    </p>
  </div>
</div>
