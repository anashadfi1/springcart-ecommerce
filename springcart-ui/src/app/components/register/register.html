
<div class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center px-4">
      <div class="w-full max-w-md bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-8 shadow-2xl">
        <div class="mb-8 text-center">
          <h1 class="text-3xl font-bold text-white tracking-tight">Create account</h1>
          <p class="text-slate-400 mt-2 text-sm">Start your journey today</p>
        </div>
        <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Full Name</label>
            <input type="text" formControlName="name" placeholder="Enter Your username"
              class="w-full px-4 py-2.5 rounded-lg bg-white/10 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"/>
            <p *ngIf="signupForm.get('name')?.invalid && signupForm.get('name')?.touched"
               class="text-red-400 text-xs mt-1">Name must be at least 2 characters.</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
            <input type="email" formControlName="email" placeholder="you@example.com"
              class="w-full px-4 py-2.5 rounded-lg bg-white/10 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"/>
            <p *ngIf="signupForm.get('email')?.invalid && signupForm.get('email')?.touched"
               class="text-red-400 text-xs mt-1">Please enter a valid email.</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
            <input type="password" formControlName="password" placeholder="••••••••"
              class="w-full px-4 py-2.5 rounded-lg bg-white/10 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"/>
            <p *ngIf="signupForm.get('password')?.invalid && signupForm.get('password')?.touched"
               class="text-red-400 text-xs mt-1">Password must be at least 6 characters.</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Confirm Password</label>
            <input type="password" formControlName="confirmPassword" placeholder="••••••••"
              class="w-full px-4 py-2.5 rounded-lg bg-white/10 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"/>
            <p *ngIf="signupForm.errors?.['passwordMismatch'] && signupForm.get('confirmPassword')?.touched"
               class="text-red-400 text-xs mt-1">Passwords do not match.</p>
          </div>
          <p *ngIf="errorMessage" class="text-red-400 text-sm text-center">{{ errorMessage }}</p>
          <button type="submit" [disabled]="signupForm.invalid || isLoading"
            class="w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold rounded-lg transition duration-200">
            {{ isLoading ? 'Creating account...' : 'Create Account' }}
          </button>
        </form>
        <p class="text-center text-slate-400 text-sm mt-6">
          Already have an account?
          <a routerLink="/login" class="text-indigo-400 hover:text-indigo-300 font-medium transition">Sign in</a>
        </p>
      </div>
    </div>
