<div class="group bg-slate-800 border border-white/10 rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 hover:-translate-y-1 flex flex-col">

  <!-- Image -->
  <a [routerLink]="['/products', product.id]" class="relative block overflow-hidden bg-slate-700 h-52">
    <img [src]="product.image" [alt]="product.name"
      class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"/>
    @if (product.badge) {
      <span class="absolute top-3 left-3 bg-orange-500 text-white text-xs font-bold px-2 py-1 rounded-full">
        {{ product.badge }}
      </span>
    }
    @if (discount > 0) {
      <span class="absolute top-3 right-3 bg-green-500 text-white text-xs font-bold px-2 py-1 rounded-full">
        -{{ discount }}%
      </span>
    }
  </a>

  <!-- Content -->
  <div class="p-4 flex flex-col flex-1">
    <p class="text-xs text-orange-500 font-semibold uppercase tracking-wide">{{ product.brand }}</p>
    <a [routerLink]="['/products', product.id]">
      <h3 class="text-white font-semibold mt-1 hover:text-orange-400 transition line-clamp-2">
        {{ product.name }}
      </h3>
    </a>
    <div class="flex items-center gap-1 mt-2">
      <span class="text-orange-400 text-sm">★</span>
      <span class="text-sm font-medium text-slate-300">{{ product.rating }}</span>
      <span class="text-xs text-slate-400">({{ product.reviews }})</span>
    </div>
    <div class="flex items-center gap-2 mt-3">
      <span class="text-xl font-bold text-white">${{ product.price }}</span>
      @if (product.originalPrice) {
        <span class="text-sm text-slate-400 line-through">${{ product.originalPrice }}</span>
      }
    </div>
    <button (click)="addToCart()"
      class="mt-4 w-full py-2 rounded-lg font-semibold text-sm transition duration-200"
      [class]="added ? 'bg-green-500 text-white' : 'bg-orange-500 hover:bg-orange-400 text-white'">
      {{ added ? '✓ Added to Cart' : 'Add to Cart' }}
    </button>
  </div>
</div>
